# LilaKosha-Flow-MK1: Unbound (Abliterated) Variant
project:
    name: "LilaKosha"
    mark: "MK1"
    generation: "G1"
    model_variant: "unbound"
    purpose: "Restoring raw creative freedom and capacity for intense dramatic conflict."

infrastructure:
    base_data_dir: "${LILAKOSHA_BASE_DATA}"
    base_process_dir: "${LILAKOSHA_BASE_PROCESS_DIR}"
    base_model_base_dir: "${LILAKOSHA_BASE_MODEL_BASE_DIR}"
    base_export_dir: "${LILAKOSHA_BASE_EXPORT_DIR}"
    inference_service: "http://localhost:8033"

storage_schema:
    raw_data:
        path: "${LILAKOSHA_BASE_DATA}/raw/unbound"
        purpose: "Storage for PIPPA, MUCE, and unrestricted long-form RP logs."
    processed_data:
        path: "${LILAKOSHA_BASE_PROCESS_DIR}/unbound_chunks"
        purpose: "Output for Stage 1 Recap-Augmented Unrestricted Chunks."
        structure: "JSONL with [Summary] blocks; bypasses refusal vectors."
    model_assets:
        path: "${LILAKOSHA_BASE_MODEL_BASE_DIR}"
        sub_paths:
            base: "OpenYourMind/gemma-4-12b-it-abliterated-uncensored" # Refusal-ablated weights
            exports: "gguf_builds/unbound"
        lora_rank: 128
        lora_alpha: 256

training_params:
    context_window: 4096
    quantization: "4-bit"
    crpo_lambdas:
        novelty: 1.0 # High injection for maximum narrative surprise
        diversity: 1.0
        surprise: 1.0
        quality: 1.0
