#     with 406 responses ("Request is not possible", "Model None not known"),
#     indicating protocol / capability mismatches rather than transport issues.
#
# Conclusion:
#   The service is promising for general chat completion workloads, but
#   the current bridge is not yet suitable for deterministic metadata
#   extraction pipelines such as LilaKosha MK1.
#
