# LilaKosha-MK1: Introspection & Recap-Augmentation Blueprint

pipeline:
    # - "refine-characters"
    # - "refine-safety-dials"
    - "refine-genre-theme"
    # - "refine-grammar"

project:
    name: "LilaKosha"
    mark: "MK1"
    generation: "G1"

volumes:
    raw: "${LILAKOSHA_VOLUME_RAW}"
    processed: "${LILAKOSHA_VOLUME_PROCESSED}"

services:
    local:
        provider: openai-compatible
        base_url: "${LILAKOSHA_SERVICE_LOCAL}"
        api_key: dummy
        model: local
    openrouter:
        provider: openai-compatible
        base_url: https://openrouter.ai/api/v1
        api_key: "${OPENROUTER_API_KEY}"
        model: "nvidia/nemotron-3-ultra-550b-a55b:free"
        requests_per_minute: 20
    kilo:
        provider: openai-compatible
        base_url: https://api.kilo.ai/api/gateway
        api_key: "${KILO_API_KEY}"
        model: "nvidia/nemotron-3-ultra-550b-a55b:free"
        requests_per_minute: 20
    groq:
        provider: openai-compatible
        base_url: https://api.groq.com/openai/v1
        api_key: "${GROQ_API_KEY}"
        model: "meta-llama/llama-4-scout-17b-16e-instruct"
        requests_per_minute: 3
    gemini:
        provider: openai-compatible
        base_url: https://generativelanguage.googleapis.com/v1beta/openai/
        api_key: "${GEMINI_API_KEY}"
        model: "gemini-3.1-flash-lite"
        requests_per_minute: 12

bindings:
    # refine-characters:
    #     service: local
    #     temperature: 0.1
    #     max_tokens: 4096

    # refine-safety-dials:
    #     service: local
    #     temperature: 0.1
    #     max_tokens: 2048

    refine-genre-theme:
        service: kilo
        temperature: 0.1
        max_tokens: 2048

    # refine-grammar:
    #     service: local
    #     temperature: 0.0
    #     max_tokens: 2048

parameters:
    start_uuid: 019f2ced-1ed1-7222-8392-55944719287f
    stop_uuid: 019f2ced-a387-7703-b337-6c858cbf68ba

