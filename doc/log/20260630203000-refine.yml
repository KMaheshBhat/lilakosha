    #     execution:
    #         requests_per_minute: 20

    # refine-grammar:
    #     service: local
    #     temperature: 0.0
    #     max_tokens: 2048
    #     execution:
    #         requests_per_minute: 20

parameters:
    start_uuid: 019f1907-d349-72b2-b8e7-46518f167960
    stop_uuid: 019f1908-5062-79a2-9c46-5b5a77310bd4
