# LilaKosha-MK1: Introspection & Recap-Augmentation Blueprint
pipeline:
    - "refine-characters"
    - "refine-safety-dials"
    - "refine-genre-theme"
    - "refine-grammar"

project:
    name: "LilaKosha"
    mark: "MK1"
    generation: "G1"

volumes:
    raw: "${LILAKOSHA_VOLUME_RAW}"
    processed: "${LILAKOSHA_VOLUME_PROCESSED}"

services:
    inspector: "${LILAKOSHA_SERVICE_INSPECTOR}" # Tags samples (SFW vs Mature)
    grammar: "${LILAKOSHA_SERVICE_GRAMMAR}" # Converts person and tense
    summarizer: "${LILAKOSHA_SERVICE_SUMMARIZER}" # Summarizes

# The start and stop is set to minimum UUID to avoid erraneous overwites.
# Inpsect the ${LILAKOSHA_VOLUME_PROCESSED}/cdm/records to pick the
# range that should be processed and pass it as command line parameters
# to get the refine processes run on the range.
parameter:
    start_uuid: 00000000-0000-7000-8000-000000000000
    stop_uuid: 00000000-0000-7000-8000-000000000000
