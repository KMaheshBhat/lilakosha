pipeline:
    - "scalpel-characters"
    - "scalpel-grammar"

project:
    name: "LilaKosha"
    mark: "MK1"
    generation: "G1"

volumes:
    raw: "${LILAKOSHA_VOLUME_RAW}"
    processed: "${LILAKOSHA_VOLUME_PROCESSED}"

parameters:
    pc_names:
        - User
        - You
        - Anonymous
        - Player
        - Unnamed
        - Unnamed Child
        - Mister
        - Unnamed Brother
        - She
        - Master
        - Human
        - Unnamed General
        - Anon
        - Unnamed Student
    character_reset_sentinel: true
